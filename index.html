<!DOCTYPE html>
<html lang="en">

<head>
    <title>POPCAT CLASSIC CLICK</title>
    <style>
        .header-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-color: #bdaa90;
        }

        .title {
            width: 80%;
            max-width: 600px;
            margin-top: 2em;
        }

        .cat-img {
            width: 100%;
            max-width: 800px;
            text-align: center;
            color: #fff;
            font-size: 80px;
            -webkit-text-stroke: 3px #000;
            flex: 1;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            margin: 0;
        }

        #p {
            background-image: url('imgs/p.png');
            background-position: bottom;
            background-size: contain;
            background-repeat: no-repeat;
        }

        #op {
            background-image: url('imgs/op.png');
            background-position: bottom;
            background-size: contain;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <img class="title" src="imgs/popcat.svg" alt="POPCAT">
        <div class="cat-img" id="p">0</div>
    </div>

    <script>
        let count = 0;
        let catImg = document.getElementById('p');
        let audio = new Audio('audio/popcat.mp3'); <!--新增音效-->

        function add() {
            count++;    
            console.log(count);
            catImg.innerText = count; <!--讓計數器隨滑鼠點擊更新數字-->
            audio.play(); <!--播放音效-->
        }
        document.addEventListener('mousedown',add); <!--新增計數器，點擊滑鼠計數-->
    </script>

</body>

</html>
